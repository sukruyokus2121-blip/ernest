<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ErnestSoft</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<link href="assets/css/bootstrap.min.css" rel="stylesheet" />
<link href="assets/css/font-awesome.min.css" rel="stylesheet" />
<link href="assets/css/owl.carousel.min.css" rel="stylesheet" />
<link href="assets/css/animate.css" rel="stylesheet" />
<link href="style.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f7f8fc;overflow-x:hidden;}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px 20px;background:white;
position:fixed;width:100%;top:0;z-index:1000;
}
.logo{font-size:20px;font-weight:700;}
.logo span{color:#5b5bff;}
.header-right{display:flex;align-items:center;gap:10px;}
.portal-btn{
background:#0d1b2a;color:white;
padding:6px 12px;border-radius:8px;font-size:12px;
}
.menu{
width:38px;height:38px;background:#5b5bff;
border-radius:10px;display:flex;justify-content:center;align-items:center;
color:white;font-size:18px;cursor:pointer;
}

/* MOBILE MENU */
.mobile-menu{
position:fixed;top:0;right:-100%;
width:75%;height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.1);
padding:50px 20px;
display:flex;
flex-direction:column;
gap:18px;
transition:0.3s;
z-index:999;
}
.mobile-menu.active{right:0;}

.close-btn{
position:absolute;top:15px;right:20px;
font-size:22px;cursor:pointer;
}

.mobile-menu a{
color:#1f2a37;
font-size:16px;
font-weight:500;
text-decoration:none;
}
.mobile-menu a:hover{color:#5b5bff;}

/* HERO */
.hero{
margin-top:70px;
position:relative;
text-align:center;
padding:80px 15px 60px;
}

#matrix{
position:absolute;top:0;left:0;width:100%;height:100%;
opacity:0.6;
}

.slides{position:relative;min-height:260px;}
.slide{
position:absolute;width:100%;
opacity:0;
transition:1s;
}
.slide.active{opacity:1;}

.hero h1{
font-size:30px;
font-weight:800;
color:#1f2a37;
}
.hero span{color:#5b5bff;}
.hero p{color:#666;margin-top:10px;}

.buttons{margin-top:20px;}
.btn-primary{
background:#5b5bff;color:white;padding:10px 20px;border-radius:10px;border:none;
}
.btn-outline{
border:2px solid #5b5bff;color:#5b5bff;padding:10px 20px;border-radius:10px;
}

/* DOTS */
.dots{
margin-top:20px;
display:flex;
justify-content:center;
gap:8px;
}
.dot{
width:10px;height:10px;border-radius:50%;
background:#ccc;cursor:pointer;
}
.dot.active{background:#5b5bff;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Ernest<span>Soft</span></div>
<div class="header-right">
<div class="portal-btn">Portal</div>
<div class="menu" onclick="toggleMenu()">☰</div>
</div>
</div>

<div class="mobile-menu" id="mobileMenu">
<div class="close-btn" onclick="toggleMenu()">✕</div>
<a href="#">Anasayfa</a>
<a href="#services">Hizmetler</a>
<a href="#about">Hakkımızda</a>
<a href="#contact">İletişim</a>
</div>

<!-- HERO -->
<div class="hero">
<canvas id="matrix"></canvas>

<div class="slides">

<div class="slide active">
<h1>AI ile İşinizi <span>Büyütün</span></h1>
<p>Dijital dönüşümünüzü hızlandırın.</p>
<div class="buttons">
<button class="btn-primary">Başla</button>
<button class="btn-outline">Detay</button>
</div>
</div>

<div class="slide">
<h1>Modern <span>Software</span></h1>
<p>Hızlı ve ölçeklenebilir sistemler.</p>
</div>

</div>

<div class="dots">
<div class="dot active" onclick="goSlide(0)"></div>
<div class="dot" onclick="goSlide(1)"></div>
</div>

</div>

<!-- SENİN ESKİ SİTE DEVAM EDİYOR -->
<!-- ABOUT, SERVICES vs aynen duruyor -->

<script>
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("active");
}

/* SLIDER */
let currentSlide=0;
const slides=document.querySelectorAll(".slide");
const dots=document.querySelectorAll(".dot");

function showSlide(index){
slides.forEach((s,i)=>{
s.classList.remove("active");
dots[i].classList.remove("active");
});
slides[index].classList.add("active");
dots[index].classList.add("active");
currentSlide=index;
}

function goSlide(i){showSlide(i);}

setInterval(()=>{
let next=(currentSlide+1)%slides.length;
showSlide(next);
},5000);

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=400;

let letters="01";
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(247,248,252,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#5b5bff";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.95)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
